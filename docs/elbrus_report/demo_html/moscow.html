<!DOCTYPE html>\n<html lang=ru>\n<head>\n<meta charset=utf-8>\n<title>Москва</title>\n</head>\n<body>\n<h1>Москва — столица России</h1>\n<p>Москва — крупнейший город России и её столица. Расположен на реке Москве в центре Восточно-Европейской равнины. Население более 13 миллионов человек. Основана в 1147 году князем Юрием Долгоруким.</p></body></html>
